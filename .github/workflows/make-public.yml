name: Make Package Public
on:
  workflow_dispatch:

jobs:
  make-public:
    runs-on: ubuntu-latest
    steps:
      - name: Make container package public
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/quantum-memory-graph/visibility" \
            -f visibility=public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
