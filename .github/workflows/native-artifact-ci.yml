name: Native LongMemEval Artifact CI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/native-artifact-ci.yml'
      - 'benchmarks/longmemeval/native-official-20260716/**'
  pull_request:
    paths:
      - '.github/workflows/native-artifact-ci.yml'
      - 'benchmarks/longmemeval/native-official-20260716/**'

permissions:
  contents: read

concurrency:
  group: native-artifact-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'pytest>=7,<9'

      - name: Run artifact integrity validation
        working-directory: benchmarks/longmemeval/native-official-20260716
        run: |
          echo "=== ARTIFACT INTEGRITY VALIDATION ==="
          python scripts/validate_artifacts.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Run validator unit tests (only)
        working-directory: benchmarks/longmemeval/native-official-20260716
        run: |
          echo "=== VALIDATOR UNIT TESTS ==="
          python -m pytest tests/test_validate_artifacts.py -v --tb=short -p no:warnings
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify no secrets in tracked artifacts
        run: |
          echo "=== SECRET SCAN (artifact files) ==="
          # High-confidence regex patterns for API keys, tokens, private keys
          # in published artifact files (scripts, results, provenance)
          cd benchmarks/longmemeval/native-official-20260716
          PATTERNS=(
            'sk-or-v1-[A-Za-z0-9]{32,}'
            'sk-[A-Za-z0-9]{32,}'
            'OPENROUTER_API_KEY\s*=\s*sk-'
            '-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'
            'ghp_[A-Za-z0-9]{36}'
            'gho_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9_]{36,}'
          )
          exit_code=0
          for pat in "${PATTERNS[@]}"; do
            results=$(grep -rnE "$pat" scripts/ tests/ results/ PROVENANCE.md 2>/dev/null || true)
            if [ -n "$results" ]; then
              echo "FAIL: Potential secret found matching pattern: $pat"
              echo "$results"
              exit_code=1
            fi
          done
          if [ $exit_code -eq 0 ]; then
            echo "OK: No secrets found in tracked artifacts"
          fi
          exit $exit_code
