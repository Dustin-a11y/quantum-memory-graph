name: Bench'd Artifact CI

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/benchd-validate.yml'
      - 'benchmarks/longmemeval/benchd-run-e375a77f15fb/**'
  pull_request:
    paths:
      - '.github/workflows/benchd-validate.yml'
      - 'benchmarks/longmemeval/benchd-run-e375a77f15fb/**'

permissions:
  contents: read

concurrency:
  group: benchd-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'pytest>=7,<9'

      - name: Run manifest integrity validation
        working-directory: benchmarks/longmemeval/benchd-run-e375a77f15fb
        run: |
          echo "=== MANIFEST INTEGRITY VALIDATION ==="
          python validator.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Run validator unit tests
        working-directory: benchmarks/longmemeval/benchd-run-e375a77f15fb
        run: |
          echo "=== VALIDATOR UNIT TESTS ==="
          python -m pytest tests/ -v --tb=short -p no:warnings
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify no secrets in published artifacts
        run: |
          echo "=== SECRET SCAN (artifact files) ==="
          cd benchmarks/longmemeval/benchd-run-e375a77f15fb
          PATTERNS=(
            'sk-or-v1-[A-Za-z0-9]{32,}'
            'sk-[A-Za-z0-9-]{36,}'
            'OPENROUTER_API_KEY\s*=\s*sk-'
            'AIza[0-9A-Za-z\-_]{35}'
            'ghp_[A-Za-z0-9]{36}'
            'gho_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9_]{36,}'
            '-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'
            'xai-[A-Za-z0-9]{20,}'
            'Bearer [A-Za-z0-9\-_\.]{20,}'
          )
          exit_code=0
          for pat in "${PATTERNS[@]}"; do
            results=$(grep -rnE "$pat" summary.json validator.py PROVENANCE.md tests/ 2>/dev/null || true)
            if [ -n "$results" ]; then
              echo "FAIL: Potential secret matching pattern: $pat"
              echo "$results"
              exit_code=1
            fi
          done
          # Full-manifest scan (30MB) — high-confidence patterns only
          echo "=== FULL MANIFEST SECRET SCAN ==="
          for pat in "${PATTERNS[@]}"; do
            results=$(grep -nE "$pat" manifest.signed.json 2>/dev/null || true)
            if [ -n "$results" ]; then
              echo "FAIL: Potential secret in manifest matching pattern: $pat"
              echo "$results"
              exit_code=1
            fi
          done
          if [ $exit_code -eq 0 ]; then
            echo "OK: No secrets found in any published artifact"
          fi
          exit $exit_code
